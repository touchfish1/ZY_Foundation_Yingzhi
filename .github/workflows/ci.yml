name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: temurin
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Run tests
      run: gradle test

  lint-admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/admin
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: frontend/admin/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Type check
      run: npx vue-tsc -b --noEmit

  lint-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: frontend/web/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Type check
      run: npx nuxt typecheck

  test-system-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/system-service
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: temurin
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Run tests
      run: gradle test

  build:
    needs: [test-api, test-system-service, lint-admin, lint-web]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: temurin
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Build API
      run: gradle build -x test
      working-directory: backend/api
    - name: Build System Service
      run: gradle build -x test
      working-directory: backend/system-service
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Build Admin
      run: |
        npm ci
        npm run build
      working-directory: frontend/admin
    - name: Build Web
      run: |
        npm ci
        npm run build
      working-directory: frontend/web

  docker:
    needs: [build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Build and push API
      uses: docker/build-push-action@v6
      with:
        context: backend/api
        push: true
        tags: ${{ secrets.REGISTRY }}/zhangyuan-api:${{ github.sha }}
    - name: Build and push System Service
      uses: docker/build-push-action@v6
      with:
        context: backend/system-service
        push: true
        tags: ${{ secrets.REGISTRY }}/zhangyuan-system-service:${{ github.sha }}
    - name: Build and push Admin
      uses: docker/build-push-action@v6
      with:
        context: ZY_View_Migu/Admin
        push: true
        tags: ${{ secrets.REGISTRY }}/zhangyuan-admin:${{ github.sha }}
    - name: Build and push Web
      uses: docker/build-push-action@v6
      with:
        context: ZY_View_Migu/Web
        push: true
        tags: ${{ secrets.REGISTRY }}/zhangyuan-web:${{ github.sha }}
