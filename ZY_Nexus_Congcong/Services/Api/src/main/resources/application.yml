server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: zhangyuan-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:zhangyuan}
    username: ${DB_USERNAME:zhangyuan}
    password: ${DB_PASSWORD:zhangyuan}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

zhangyuan:
  security:
    jwt-secret: ${JWT_SECRET:change-this-development-secret-change-before-production}
    jwt-expires-seconds: ${JWT_EXPIRES_SECONDS:7200}
    default-admin:
      username: ${DEFAULT_ADMIN_USERNAME:admin}
      password: ${DEFAULT_ADMIN_PASSWORD:admin123}
      nickname: ${DEFAULT_ADMIN_NICKNAME:Super Admin}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    org.springframework.security: INFO
