server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: payment-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:100.125.148.23}:${NACOS_PORT:8848}
        ip: ${NACOS_DISCOVERY_IP:127.0.0.1}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:chengccn}
  datasource:
    url: jdbc:postgresql://${DB_HOST:100.125.148.23}:${DB_PORT:5432}/${DB_NAME:zhangyuan}
    username: ${DB_USERNAME:zhangyuan}
    password: ${DB_PASSWORD:zhangyuan}
    hikari:
      maximum-pool-size: 5
  data:
    redis:
      host: ${REDIS_HOST:100.125.148.23}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 7200

logging:
  level:
    root: INFO
