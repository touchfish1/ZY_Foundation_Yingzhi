server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: system-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:100.125.148.23}:${NACOS_PORT:8848}
        ip: ${NACOS_DISCOVERY_IP:127.0.0.1}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD}
      config:
        server-addr: ${NACOS_HOST:100.125.148.23}:${NACOS_PORT:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD}
        file-extension: yaml
        import-check:
          enabled: false
    openfeign:
      lazy-attributes-resolution: true
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 5000
  datasource:
    url: jdbc:postgresql://${DB_HOST:100.125.148.23}:${DB_PORT:5432}/${DB_NAME:zhangyuan}
    username: ${DB_USERNAME:zhangyuan}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:100.125.148.23}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  flyway:
    enabled: false

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 7200
  is-log: false

logging:
  level:
    root: INFO


