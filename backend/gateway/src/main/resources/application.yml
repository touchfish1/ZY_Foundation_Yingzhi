server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:100.125.148.23}:${NACOS_PORT:8848}
        ip: ${NACOS_DISCOVERY_IP:127.0.0.1}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:chengccn}
      config:
        server-addr: ${NACOS_HOST:100.125.148.23}:${NACOS_PORT:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:chengccn}
        file-extension: yaml
        import-check:
          enabled: false
    # In dev mode, use direct URIs since Nacos may cache stale IPs from previous registrations.
    # lb:// URIs rely on Nacos service discovery which can resolve to wrong IPs on Windows/WSL.
    # For production, switch back to lb:// and ensure proper network configuration.
    gateway:
      routes:
        # Auth service - login and current user
        - id: auth-admin
          uri: ${AUTH_SERVICE_URI:http://127.0.0.1:8082}
          predicates:
            - Path=/admin/auth/**
        # Auth service - user management
        - id: auth-users
          uri: ${AUTH_SERVICE_URI:http://127.0.0.1:8082}
          predicates:
            - Path=/admin/system/users/**
        # Auth service - role management
        - id: auth-roles
          uri: ${AUTH_SERVICE_URI:http://127.0.0.1:8082}
          predicates:
            - Path=/admin/system/roles/**
        # Auth service - permission management
        - id: auth-permissions
          uri: ${AUTH_SERVICE_URI:http://127.0.0.1:8082}
          predicates:
            - Path=/admin/system/permissions/**
        # Auth service - menu management
        - id: auth-menus
          uri: ${AUTH_SERVICE_URI:http://127.0.0.1:8082}
          predicates:
            - Path=/admin/system/menus/**
        # Auth service - DDD auth APIs
        - id: auth-ddd
          uri: ${AUTH_SERVICE_URI:http://127.0.0.1:8082}
          predicates:
            - Path=/api/ddd/auth/**
        # System service admin API
        - id: system-admin
          uri: ${SYSTEM_SERVICE_URI:http://127.0.0.1:8081}
          predicates:
            - Path=/admin/system/**
        # System service public API
        - id: system-api
          uri: ${SYSTEM_SERVICE_URI:http://127.0.0.1:8081}
          predicates:
            - Path=/api/system/**
        # System service DDD settings (CMS seed data)
        - id: system-ddd
          uri: ${SYSTEM_SERVICE_URI:http://127.0.0.1:8081}
          predicates:
            - Path=/api/ddd/settings/**
        # Order service
        - id: order-service
          uri: ${ORDER_SERVICE_URI:http://127.0.0.1:8083}
          predicates:
            - Path=/api/orders/**
        # Order service - subscriptions (public)
        - id: order-subscriptions
          uri: ${ORDER_SERVICE_URI:http://127.0.0.1:8083}
          predicates:
            - Path=/api/subscriptions/**
        # Order service - subscriptions (admin)
        - id: order-admin-subscriptions
          uri: ${ORDER_SERVICE_URI:http://127.0.0.1:8083}
          predicates:
            - Path=/admin/subscriptions/**
        # Order service - usage
        - id: order-usage
          uri: ${ORDER_SERVICE_URI:http://127.0.0.1:8083}
          predicates:
            - Path=/api/usage/**
        # Payment service
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URI:http://127.0.0.1:8084}
          predicates:
            - Path=/api/payments/**
        # Payment service admin
        - id: payment-admin
          uri: ${PAYMENT_SERVICE_URI:http://127.0.0.1:8084}
          predicates:
            - Path=/admin/payments/**
        # Main API — admin routes
        - id: api-admin
          uri: ${API_SERVICE_URI:http://127.0.0.1:8088}
          predicates:
            - Path=/admin/**
        # User service - auth
        - id: user-auth
          uri: ${USER_SERVICE_URI:http://127.0.0.1:8085}
          predicates:
            - Path=/api/auth/**
        # User service - balance
        - id: user-balance
          uri: ${USER_SERVICE_URI:http://127.0.0.1:8085}
          predicates:
            - Path=/api/balance/**
        # User service - logs
        - id: user-logs
          uri: ${USER_SERVICE_URI:http://127.0.0.1:8085}
          predicates:
            - Path=/api/logs/**
        # User service - admin users
        - id: user-admin
          uri: ${USER_SERVICE_URI:http://127.0.0.1:8085}
          predicates:
            - Path=/api/users/**
        # Main API — public routes
        - id: api-public
          uri: ${API_SERVICE_URI:http://127.0.0.1:8088}
          predicates:
            - Path=/api/**
        # Main API — actuator
        - id: api-actuator
          uri: ${API_SERVICE_URI:http://127.0.0.1:8088}
          predicates:
            - Path=/actuator/**
        # Web frontend (Nuxt, direct URI — not registered with Nacos)
        - id: web
          uri: ${WEB_SERVICE_URI:http://127.0.0.1:3000}
          predicates:
            - Path=/**

logging:
  level:
    org.springframework.cloud.gateway: INFO
