server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: zhangyuan-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:100.125.148.23}:${DB_PORT:5432}/${DB_NAME:zhangyuan}
    username: ${DB_USERNAME:zhangyuan}
    password: ${DB_PASSWORD:zhangyuan}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:100.125.148.23}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

zhangyuan:
  security:
    jwt-secret: ${JWT_SECRET:change-this-development-secret-change-before-production}
    jwt-expires-seconds: ${JWT_EXPIRES_SECONDS:7200}
    default-admin:
      username: ${DEFAULT_ADMIN_USERNAME:admin}
      password: ${DEFAULT_ADMIN_PASSWORD:admin123}
      nickname: ${DEFAULT_ADMIN_NICKNAME:Super Admin}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://100.125.148.23:9000}
    access-key: ${MINIO_ACCESS_KEY:zhangyuan}
    secret-key: ${MINIO_SECRET_KEY:zhangyuan-minio-secret}
    bucket: ${MINIO_BUCKET:zhangyuan-assets}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    org.springframework.security: INFO

sa-token:
  token-name: Authorization
  timeout: 7200
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false
