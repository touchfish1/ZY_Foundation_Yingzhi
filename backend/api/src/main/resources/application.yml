server:
  port: ${SERVER_PORT:8088}

spring:
  application:
    name: zhangyuan-api
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:100.125.148.23}:${NACOS_PORT:8848}
        ip: ${NACOS_DISCOVERY_IP:127.0.0.1}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:}
      config:
        server-addr: ${NACOS_HOST:100.125.148.23}:${NACOS_PORT:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:}
        file-extension: yaml
        import-check:
          enabled: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:100.125.148.23}:${DB_PORT:5432}/${DB_NAME:zhangyuan}
    username: ${DB_USERNAME:zhangyuan}
    password: ${DB_PASSWORD:zhangyuan}
    hikari:
      maximum-pool-size: 5
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: redis
    redis:
      time-to-live: ${CACHE_TTL:300s}
      cache-null-values: false
  data:
    redis:
      host: ${REDIS_HOST:100.125.148.23}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

zhangyuan:
  security:
    jwt-secret: ${JWT_SECRET:change-this-development-secret-change-before-production}
    jwt-expires-seconds: ${JWT_EXPIRES_SECONDS:7200}
    default-admin:
      username: ${DEFAULT_ADMIN_USERNAME:admin}
      password: ${DEFAULT_ADMIN_PASSWORD:admin123}
      nickname: ${DEFAULT_ADMIN_NICKNAME:Super Admin}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://100.125.148.23:9000}
    access-key: ${MINIO_ACCESS_KEY:zhangyuan}
    secret-key: ${MINIO_SECRET_KEY:zhangyuan-minio-secret}
    bucket: ${MINIO_BUCKET:zhangyuan-assets}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    org.springframework.security: INFO

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 7200
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false
