services:
  api:
    build:
      context: ../../backend
      dockerfile: api/Dockerfile
    container_name: zhangyuan-api
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: http://minio:9000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin123}
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: ${NACOS_PASSWORD:-chengccn}
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zhangyuan-dev

  system-service:
    build:
      context: ../../backend
      dockerfile: system-service/Dockerfile
    container_name: zhangyuan-system
    environment:
      DB_HOST: postgres
      SERVER_PORT: 8081
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: ${NACOS_PASSWORD:-chengccn}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zhangyuan-dev

  order-service:
    build:
      context: ../../backend
      dockerfile: order-service/Dockerfile
    container_name: zhangyuan-order
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      SERVER_PORT: 8083
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: ${NACOS_PASSWORD:-chengccn}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zhangyuan-dev

  payment-service:
    build:
      context: ../../backend
      dockerfile: payment-service/Dockerfile
    container_name: zhangyuan-payment
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      SERVER_PORT: 8084
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: ${NACOS_PASSWORD:-chengccn}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zhangyuan-dev

  auth-service:
    build:
      context: ../../backend
      dockerfile: auth-service/Dockerfile
    container_name: zhangyuan-auth
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      SERVER_PORT: 8082
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: ${NACOS_PASSWORD:-chengccn}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zhangyuan-dev

  gateway:
    build:
      context: ../../backend
      dockerfile: gateway/Dockerfile
    container_name: zhangyuan-gateway
    environment:
      SERVER_PORT: 8080
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      NACOS_USERNAME: nacos
      NACOS_PASSWORD: ${NACOS_PASSWORD:-chengccn}
    ports:
      - "8080:8080"
    depends_on:
      - api
      - system-service
      - auth-service
      - order-service
      - payment-service
      - web
    restart: unless-stopped
    networks:
      - zhangyuan-dev

  web:
    build:
      context: ../../frontend/web
      dockerfile: Dockerfile
    container_name: zhangyuan-web
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8080
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - zhangyuan-dev

  admin:
    build:
      context: ../../frontend/admin
      dockerfile: Dockerfile
    container_name: zhangyuan-admin
    ports:
      - "81:80"
    restart: unless-stopped
    networks:
      - zhangyuan-dev

networks:
  zhangyuan-dev:
    external: true
