services:
  postgres:
    image: postgres:16-alpine
    container_name: zhangyuan-postgres
    environment:
      POSTGRES_DB: zhangyuan
      POSTGRES_USER: zhangyuan
      POSTGRES_PASSWORD: zhangyuan
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhangyuan -d zhangyuan"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zhangyuan-dev

  redis:
    image: redis:7-alpine
    container_name: zhangyuan-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zhangyuan-dev

  minio:
    image: minio/minio:latest
    container_name: zhangyuan-minio
    environment:
      MINIO_ROOT_USER: zhangyuan
      MINIO_ROOT_PASSWORD: zhangyuan-minio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zhangyuan-dev

  nacos:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/nacos/nacos-server:v3.2.2
    container_name: nacos-standalone
    environment:
      - PREFER_HOST_MODE=hostname
      - MODE=standalone
      - NACOS_AUTH_IDENTITY_KEY=chengccn
      - NACOS_AUTH_IDENTITY_VALUE=cheng123456
      - NACOS_AUTH_TOKEN=75rwn6PJrEdiAyLMkbod8aQkb8wERm5+ywACcy059qE=
    volumes:
      - ./standalone-logs/:/home/nacos/logs
    ports:
      - "8080:8080"
      - "8848:8848"
      - "9848:9848"
    networks:
      - zhangyuan-dev
  
  rocketmq-namesrv:
    image: apache/rocketmq:5.3.0
    container_name: rocketmq-namesrv
    ports:
      - "9876:9876"
    volumes:
      - ./data/rocketmq/logs/namesrv:/home/rocketmq/logs
    command: ["sh", "mqnamesrv"]
    networks:
      - zhangyuan-dev

  rocketmq-broker:
    image: apache/rocketmq:5.3.0
    container_name: rocketmq-broker
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      - NAMESRV_ADDR=rocketmq-namesrv:9876
      - JAVA_OPT_EXT=-Duser.home=/home/rocketmq
    volumes:
      - ./data/rocketmq/conf/broker.conf:/home/rocketmq/rocketmq-5.3.0/conf/broker.conf
    command: ["sh", "mqbroker", "-c", "/home/rocketmq/rocketmq-5.3.0/conf/broker.conf"]
    depends_on:
      - rocketmq-namesrv
    networks:
      - zhangyuan-dev

  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: rocketmq-dashboard
    ports:
      - "8086:8082"
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876"
    depends_on:
      - rocketmq-namesrv
    networks:
      - zhangyuan-dev

networks:
  zhangyuan-dev:
    driver: bridge