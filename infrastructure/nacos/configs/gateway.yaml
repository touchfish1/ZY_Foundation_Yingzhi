spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
              - "http://127.0.0.1:*"
              - "https://*.zhangyuan.example.com"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-admin
          uri: lb://auth-service
          predicates:
            - Path=/admin/auth/**
        - id: auth-users
          uri: lb://auth-service
          predicates:
            - Path=/admin/system/users/**
        - id: auth-roles
          uri: lb://auth-service
          predicates:
            - Path=/admin/system/roles/**
        - id: auth-permissions
          uri: lb://auth-service
          predicates:
            - Path=/admin/system/permissions/**
        - id: auth-menus
          uri: lb://auth-service
          predicates:
            - Path=/admin/system/menus/**
        - id: auth-ddd
          uri: lb://auth-service
          predicates:
            - Path=/api/ddd/auth/**
        - id: system-admin
          uri: lb://system-service
          predicates:
            - Path=/admin/system/**
        - id: system-api
          uri: lb://system-service
          predicates:
            - Path=/api/system/**
        - id: system-ddd
          uri: lb://system-service
          predicates:
            - Path=/api/ddd/settings/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
        # Payment service admin
        - id: payment-admin
          uri: lb://payment-service
          predicates:
            - Path=/admin/payments/**
        - id: order-subscriptions
          uri: lb://order-service
          predicates:
            - Path=/api/subscriptions/**
        - id: order-admin-subscriptions
          uri: lb://order-service
          predicates:
            - Path=/admin/subscriptions/**
        - id: order-usage
          uri: lb://order-service
          predicates:
            - Path=/api/usage/**
        - id: api-admin
          uri: lb://zhangyuan-api
          predicates:
            - Path=/admin/**
        - id: user-auth
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
        - id: user-balance
          uri: lb://user-service
          predicates:
            - Path=/api/balance/**
        - id: user-logs
          uri: lb://user-service
          predicates:
            - Path=/api/logs/**
        - id: user-admin
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: api-public
          uri: lb://zhangyuan-api
          predicates:
            - Path=/api/**
        - id: api-actuator
          uri: lb://zhangyuan-api
          predicates:
            - Path=/actuator/**
        - id: web
          uri: http://web:3000
          predicates:
            - Path=/**

logging:
  level:
    org.springframework.cloud.gateway: INFO
