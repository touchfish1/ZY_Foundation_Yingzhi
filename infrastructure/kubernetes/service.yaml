apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: zhangyuan
spec:
  selector:
    app: api
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: zhangyuan
spec:
  selector:
    app: web
  ports:
  - port: 3000
    targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: zhangyuan
spec:
  selector:
    app: admin
  ports:
  - port: 80
    targetPort: 80
