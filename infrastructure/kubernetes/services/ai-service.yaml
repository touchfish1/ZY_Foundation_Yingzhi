apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  labels:
    app: ai-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
      - name: ai
        image: ${REGISTRY}/zhangyuan-ai-service:${IMAGE_TAG}
        ports:
        - containerPort: 8086
        env:
        - name: SERVER_PORT
          value: "8086"
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: zhangyuan-redis
              key: host
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: zhangyuan-ai
              key: openai-api-key
        - name: CLAUDE_API_KEY
          valueFrom:
            secretKeyRef:
              name: zhangyuan-ai
              key: claude-api-key
        - name: DEEPSEEK_API_KEY
          valueFrom:
            secretKeyRef:
              name: zhangyuan-ai
              key: deepseek-api-key
        - name: QWEN_API_KEY
          valueFrom:
            secretKeyRef:
              name: zhangyuan-ai
              key: qwen-api-key
        - name: MOONSHOT_API_KEY
          valueFrom:
            secretKeyRef:
              name: zhangyuan-ai
              key: moonshot-api-key
        - name: NACOS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zhangyuan-nacos
              key: password
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8086
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8086
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
spec:
  selector:
    app: ai-service
  ports:
  - port: 8086
    targetPort: 8086
