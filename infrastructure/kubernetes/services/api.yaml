apiVersion: apps/v1
kind: Deployment
metadata:
  name: zhangyuan-api
  labels:
    app: zhangyuan-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zhangyuan-api
  template:
    metadata:
      labels:
        app: zhangyuan-api
    spec:
      containers:
      - name: api
        image: ${REGISTRY}/zhangyuan-api:${IMAGE_TAG}
        ports:
        - containerPort: 8088
        env:
        - name: SERVER_PORT
          value: "8088"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: zhangyuan-db
              key: host
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "zhangyuan"
        - name: DB_USERNAME
          value: "zhangyuan"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zhangyuan-db
              key: password
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: zhangyuan-redis
              key: host
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: zhangyuan-auth
              key: jwt-secret
        - name: DEFAULT_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zhangyuan-auth
              key: admin-password
        - name: NACOS_HOST
          value: "nacos"
        - name: NACOS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zhangyuan-nacos
              key: password
        - name: MINIO_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: zhangyuan-minio
              key: endpoint
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: zhangyuan-minio
              key: access-key
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: zhangyuan-minio
              key: secret-key
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8088
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8088
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: zhangyuan-api
spec:
  selector:
    app: zhangyuan-api
  ports:
  - port: 8088
    targetPort: 8088
