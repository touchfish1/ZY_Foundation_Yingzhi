apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth
        image: ${REGISTRY}/zhangyuan-auth-service:${IMAGE_TAG}
        ports:
        - containerPort: 8082
        env:
        - name: SERVER_PORT
          value: "8082"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: zhangyuan-db
              key: host
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zhangyuan-db
              key: password
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: zhangyuan-redis
              key: host
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: zhangyuan-auth
              key: jwt-secret
        - name: DEFAULT_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zhangyuan-auth
              key: admin-password
        - name: NACOS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zhangyuan-nacos
              key: password
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "400m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
  - port: 8082
    targetPort: 8082
