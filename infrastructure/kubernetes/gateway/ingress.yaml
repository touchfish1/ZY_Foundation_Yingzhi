apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zhangyuan-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.zhangyuan.example.com
    - admin.zhangyuan.example.com
    - www.zhangyuan.example.com
    secretName: zhangyuan-tls
  rules:
  - host: api.zhangyuan.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8080
  - host: admin.zhangyuan.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin
            port:
              number: 80
  - host: www.zhangyuan.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web
            port:
              number: 3000
