apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: ${REGISTRY}/zhangyuan-gateway:${IMAGE_TAG}
        ports:
        - containerPort: 8080
        env:
        - name: SERVER_PORT
          value: "8080"
        - name: NACOS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zhangyuan-nacos
              key: password
        - name: API_SERVICE_URI
          value: "lb://zhangyuan-api"
        - name: AUTH_SERVICE_URI
          value: "lb://auth-service"
        - name: SYSTEM_SERVICE_URI
          value: "lb://system-service"
        - name: USER_SERVICE_URI
          value: "lb://user-service"
        - name: ORDER_SERVICE_URI
          value: "lb://order-service"
        - name: PAYMENT_SERVICE_URI
          value: "lb://payment-service"
        - name: AI_SERVICE_URI
          value: "lb://ai-service"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "400m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector:
    app: gateway
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
