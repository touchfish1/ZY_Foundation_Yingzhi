apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: zhangyuan
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: zhangyuan-api:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: zhangyuan-config
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zhangyuan-secret
              key: db-password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: zhangyuan-secret
              key: jwt-secret
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: zhangyuan-secret
              key: minio-access-key
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: zhangyuan-secret
              key: minio-secret-key
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 20
        resources:
          requests:
            cpu: "256m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "768Mi"
