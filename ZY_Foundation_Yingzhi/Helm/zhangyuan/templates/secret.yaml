apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zhangyuan.name" . }}-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  db-password: {{ .Values.secrets.dbPassword }}
  jwt-secret: {{ .Values.secrets.jwtSecret }}
  minio-access-key: {{ .Values.secrets.minioAccessKey }}
  minio-secret-key: {{ .Values.secrets.minioSecretKey }}
