apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zhangyuan.name" . }}-api
  namespace: {{ .Values.namespace }}
  labels:
    app: api
    {{- include "zhangyuan.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: "{{ .Values.image.registry }}{{ .Values.api.image }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.api.port }}
        envFrom:
        - configMapRef:
            name: {{ include "zhangyuan.name" . }}-config
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "zhangyuan.name" . }}-secret
              key: db-password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "zhangyuan.name" . }}-secret
              key: jwt-secret
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "zhangyuan.name" . }}-secret
              key: minio-access-key
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "zhangyuan.name" . }}-secret
              key: minio-secret-key
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: {{ .Values.api.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: {{ .Values.api.port }}
          initialDelaySeconds: 60
          periodSeconds: 20
        resources:
          {{- toYaml .Values.api.resources | nindent 10 }}
