{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "zhangyuan.name" . }}-ingress
  namespace: {{ .Values.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /api/
        pathType: Prefix
        backend:
          service:
            name: {{ include "zhangyuan.name" . }}-api
            port:
              number: {{ .Values.api.port }}
      - path: /actuator/
        pathType: Prefix
        backend:
          service:
            name: {{ include "zhangyuan.name" . }}-api
            port:
              number: {{ .Values.api.port }}
      - path: /admin/
        pathType: Prefix
        backend:
          service:
            name: {{ include "zhangyuan.name" . }}-api
            port:
              number: {{ .Values.api.port }}
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "zhangyuan.name" . }}-web
            port:
              number: {{ .Values.web.port }}
  - host: {{ .Values.ingress.adminHost }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "zhangyuan.name" . }}-admin
            port:
              number: {{ .Values.admin.port }}
{{- end }}
